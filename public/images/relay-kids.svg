<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyKidsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4B5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#skyKidsGradient)"/>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="35" fill="#FFD700" opacity="0.9"/>
  
  <!-- Ground -->
  <rect y="210" width="400" height="90" fill="#90EE90"/>
  
  <!-- Grass patches -->
  <ellipse cx="80" cy="220" rx="40" ry="8" fill="#7CCD7C" opacity="0.6"/>
  <ellipse cx="250" cy="225" rx="35" ry="7" fill="#7CCD7C" opacity="0.5"/>
  
  <!-- Kid 1 (left) - smallest -->
  <g>
    <circle cx="70" cy="170" r="10" fill="#FFB6C1"/>
    <rect x="66" y="182" width="8" height="15" fill="#FF69B4"/>
    <rect x="58" y="197" width="6" height="12" fill="#FFD700"/>
    <rect x="78" y="197" width="6" height="12" fill="#FFD700"/>
  </g>
  
  <!-- Kid 2 (center-left) - mid size -->
  <g>
    <circle cx="140" cy="160" r="11" fill="#FDBCB4"/>
    <rect x="135" y="173" width="10" height="18" fill="#87CEEB"/>
    <rect x="125" y="191" width="7" height="14" fill="#FF6347"/>
    <rect x="148" y="191" width="7" height="14" fill="#FF6347"/>
  </g>
  
  <!-- Kid 3 (center-right) - tallest -->
  <g>
    <circle cx="220" cy="155" r="12" fill="#DEB887"/>
    <rect x="214" y="169" width="12" height="22" fill="#32CD32"/>
    <rect x="202" y="191" width="8" height="16" fill="#8B4513"/>
    <rect x="230" y="191" width="8" height="16" fill="#8B4513"/>
  </g>
  
  <!-- Kid 4 (right) - mid size -->
  <g>
    <circle cx="290" cy="165" r="10" fill="#F0E68C"/>
    <rect x="286" y="177" width="8" height="16" fill="#FF4500"/>
    <rect x="278" y="193" width="6" height="12" fill="#FFDAB9"/>
    <rect x="298" y="193" width="6" height="12" fill="#FFDAB9"/>
  </g>
  
  <!-- Celebration confetti -->
  <circle cx="100" cy="100" r="3" fill="#FF1493" opacity="0.7"/>
  <circle cx="150" cy="110" r="3" fill="#00CED1" opacity="0.7"/>
  <circle cx="200" cy="95" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="250" cy="105" r="3" fill="#FF69B4" opacity="0.7"/>
  <circle cx="300" cy="100" r="3" fill="#00FF00" opacity="0.7"/>
  
  <!-- Joyful caption -->
  <text x="200" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#16a34a">
    Young Hearts Leading
  </text>
  <text x="200" y="55" font-size="13" text-anchor="middle" fill="#333">
    Kids Running Together for Health
  </text>
  
  <!-- Running motion lines -->
  <line x1="50" y1="175" x2="40" y2="175" stroke="#999" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="170" x2="108" y2="170" stroke="#999" stroke-width="1.5" opacity="0.5"/>
  <line x1="270" y1="175" x2="285" y2="175" stroke="#999" stroke-width="1.5" opacity="0.5"/>
</svg>