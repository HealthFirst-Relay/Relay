<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#FFD700" opacity="0.8"/>
  
  <!-- Ground -->
  <rect y="200" width="400" height="100" fill="#90EE90"/>
  
  <!-- Community runners - diverse group -->
  <!-- Runner 1 (front left) -->
  <g>
    <circle cx="80" cy="160" r="12" fill="#FFB6C1"/>
    <rect x="75" y="175" width="10" height="20" fill="#4169E1"/>
    <rect x="65" y="190" width="8" height="15" fill="#FF6347"/>
    <rect x="87" y="190" width="8" height="15" fill="#FF6347"/>
  </g>
  
  <!-- Runner 2 (center) -->
  <g>
    <circle cx="150" cy="150" r="12" fill="#DEB887"/>
    <rect x="145" y="165" width="10" height="20" fill="#228B22"/>
    <rect x="135" y="180" width="8" height="15" fill="#FFD700"/>
    <rect x="157" y="180" width="8" height="15" fill="#FFD700"/>
  </g>
  
  <!-- Runner 3 (back right) -->
  <g>
    <circle cx="220" cy="140" r="12" fill="#F0E68C"/>
    <rect x="215" y="155" width="10" height="20" fill="#FF4500"/>
    <rect x="205" y="170" width="8" height="15" fill="#8B4513"/>
    <rect x="227" y="170" width="8" height="15" fill="#8B4513"/>
  </g>
  
  <!-- Runner 4 (right) -->
  <g>
    <circle cx="290" cy="160" r="12" fill="#CD853F"/>
    <rect x="285" y="175" width="10" height="20" fill="#000080"/>
    <rect x="275" y="190" width="8" height="15" fill="#DC143C"/>
    <rect x="297" y="190" width="8" height="15" fill="#DC143C"/>
  </g>
  
  <!-- Finish line ribbon -->
  <line x1="340" y1="100" x2="340" y2="200" stroke="#FF1493" stroke-width="3"/>
  <polyline points="320,110 340,100 360,110" fill="#FF1493"/>
  
  <!-- Clouds -->
  <ellipse cx="60" cy="40" rx="25" ry="15" fill="white" opacity="0.6"/>
  <ellipse cx="85" cy="45" rx="20" ry="12" fill="white" opacity="0.5"/>
  
  <!-- Community text -->
  <text x="200" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#16a34a">
    Health First Relay
  </text>
  <text x="200" y="60" font-size="14" text-anchor="middle" fill="#333">
    Together We Run. Together We Grow.
  </text>
</svg>